<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="style.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Outfit:wght@100..900&family=Roboto:ital,wght@0,100..900;1,100..900&display=swap"
      rel="stylesheet"
    />
    <title>Allen's WeatherApp</title>
  </head>
  <body>
    <div class="container">
      <h1>Weather App</h1>
      <div class="form-section">
        <form action="">
          <label for="search"></label>
          <input type="text" id="search" class="form-input" />
          <button type="submit" id="btn" class="form-btn">Search</button>
        </form>
        <div class="grid-items">
          <main class="main-data">
            <div class="main-text-container">
              <p class="main-date">Fri, 27 Mar 2026</p>
              <h1>City, Reigon, Country</h1>
              <div class="flex-main-weather">
                <p class="degrees">75&deg; <span class="degree-scale">F</span></p>
                <div class="main-img-container">
                  <img
                    class="main-img"
                    src="//cdn.weatherapi.com/weather/64x64/night/122.png"
                    alt="Main-weather Display"
                  />
                </div>
              </div>
              <p class="condition">Clear Sky</p>
              <div class="flex-degrees">
                <p class="highest">H: 80&deg;</p>
                <p class="lowest">L: 55&deg;</p>
              </div>
            </div>
            <div class="sub-info-container">
              <div class="sub-info"></div>
              <div class="sub-info"></div>
              <div class="sub-info"></div>
              <div class="sub-info"></div>
              <div class="sub-info"></div>
            </div>
          </main>
          <aside class="days-forecast"></aside>
          <div class="hourly-forecast"></div>
        </div>
      </div>
    </div>
    <script src="app.js"></script>
  </body>
</html>
