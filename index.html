          </main>
          <aside class="days-forecast">
            <div class="aside-header aside-flex">
              <div class="aside-icon">
                <span class="fa-stack fa-1x">
                  <i class="fa fa-circle fa-stack-2x icon-background"></i>
                  <i class="fa-solid fa-calendar fa-stack-1x" style="color: rgb(116, 192, 252)"></i>
                </span>
              </div>
              <div class="aside-heading">
                <h1 class="aside-forecast-header">5 Day Forecast</h1>
              </div>
            </div>
            <div class="day-forecast-container">
              <div class="day-forecast forecast-flex">
                <div class="forecast-img-container">
                  <img
                    src="//cdn.weatherapi.com/weather/64x64/day/113.png"
                    alt=""
                    class="forecast"
                  />
                </div>
                <div class="aside-div-flex">
                  <div class="aside-temp-container">
                    <p class="aside-date">Wed, March 30</p>
                    <p class="aside-temp">60&deg;</p>
                  </div>
                  <div class="aside-condition">Clear Sky</div>
                </div>
              </div>
              <div class="day-forecast forecast-flex">
                <div class="forecast-img-container">
                  <img
                    src="//cdn.weatherapi.com/weather/64x64/day/113.png"
                    alt=""
                    class="forecast"
                  />
                </div>
                <div class="aside-div-flex">
                  <div class="aside-temp-container">
                    <p class="aside-date">Thurs, March 31</p>
                    <p class="aside-temp">60&deg;</p>
                  </div>
                  <div class="aside-condition">Clear Sky</div>
                </div>
              </div>
              <div class="day-forecast forecast-flex">
                <div class="forecast-img-container">
                  <img
                    src="//cdn.weatherapi.com/weather/64x64/day/113.png"
                    alt=""
                    class="forecast"
                  />
                </div>
                <div class="aside-div-flex">
                  <div class="aside-temp-container">
                    <p class="aside-date">Fri, April 1</p>
                    <p class="aside-temp">60&deg;</p>
                  </div>
                  <div class="aside-condition">Clear Sky</div>
                </div>
              </div>
              <div class="day-forecast forecast-flex">
                <div class="forecast-img-container">
                  <img
                    src="//cdn.weatherapi.com/weather/64x64/day/113.png"
                    alt=""
                    class="forecast"
                  />
                </div>
                <div class="aside-div-flex">
                  <div class="aside-temp-container">
                    <p class="aside-date">Sat, April 2</p>
                    <p class="aside-temp">60&deg;</p>
                  </div>
                  <div class="aside-condition">Clear Sky</div>
                </div>
              </div>
              <div class="day-forecast forecast-flex">
                <div class="forecast-img-container">
                  <img
                    src="//cdn.weatherapi.com/weather/64x64/day/113.png"
                    alt=""
                    class="forecast"
                  />
                </div>

                  </div>
                  <div class="aside-condition">Clear Sky</div>
                </div>
              </div>
            </div>
          </aside>
          <div class="hourly-forecast">
            <div class="header-container">
              <h2 class="hourly-forecast-header">Hourly Forecast</h2>
            </div>

              <div class="hourly-forecast-item">
                <p>8AM</p>
                <img src="//cdn.weatherapi.com/weather/64x64/day/113.png" alt="" class="forecast" />
                <p>55&deg;</p>
              </div>
              <div class="hourly-forecast-item">
                <p>9AM</p>
                <img src="//cdn.weatherapi.com/weather/64x64/day/113.png" alt="" class="forecast" />
                <p>55&deg;</p>
              </div>
              <div class="hourly-forecast-item">
                <p>10AM</p>
                <img src="//cdn.weatherapi.com/weather/64x64/day/113.png" alt="" class="forecast" />
                <p>55&deg;</p>
              </div>
              <div class="hourly-forecast-item">

                <img src="//cdn.weatherapi.com/weather/64x64/day/113.png" alt="" class="forecast" />
                <p>55&deg;</p>

              <div class="hourly-forecast-item">

                <img src="//cdn.weatherapi.com/weather/64x64/day/113.png" alt="" class="forecast" />
