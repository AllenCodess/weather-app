<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="style.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Outfit:wght@100..900&family=Roboto:ital,wght@0,100..900;1,100..900&display=swap"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
      integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    />
    <title>Allen's WeatherApp</title>
  </head>
  <body>
    <div class="container">
      <h1>Weather App</h1>
      <div class="form-section">
        <form action="">
          <label for="search"></label>
          <input type="text" id="search" class="form-input" />
          <button type="submit" id="btn" class="form-btn">Search</button>
        </form>
        <div class="grid-items">
          <main class="main-data" id="main-content"></main>
          <aside class="days-forecast">
            <div class="aside-header aside-flex">
              <div class="aside-icon">
                <span class="fa-stack fa-1x">
                  <i class="fa fa-circle fa-stack-2x icon-background"></i>
                  <i class="fa-solid fa-calendar fa-stack-1x" style="color: rgb(116, 192, 252)"></i>
                </span>
              </div>
              <div class="aside-heading">
                <h1 class="aside-forecast-header">5 Day Forecast</h1>
              </div>
            </div>
            <div class="day-forecast-container"></div>
          </aside>
          <div class="hourly-forecast">
            <div class="header-container">
              <h2 class="hourly-forecast-header">Hourly Forecast</h2>
            </div>
            <div class="hourly-forecast-content-items"></div>
          </div>
        </div>
      </div>
    </div>
    <script src="app.js"></script>
  </body>
</html>
